<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Patronage Realtor</title>
    
    <!-- PERF: Critical meta tags for quick rendering -->
    <meta name="description" content="Patronage Realtor – modern real estate platform. Properties, investment, webinars, and expert guidance." />
    <meta property="og:title" content="Patronage Realtor" />
    <meta property="og:description" content="Patronage Realtor – modern real estate platform. Properties, investment, webinars, and expert guidance." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@patronagerealtor" />
    <meta name="twitter:title" content="Patronage Realtor" />
    <meta name="twitter:description" content="Patronage Realtor – modern real estate platform. Properties, investment, webinars, and expert guidance." />

    <!-- PERF: Favicon with small size -->
    <link rel="icon" type="image/png" href="/logo/favicon.png" />
    
    <!-- PERF: Preconnect to external domains for early connection setup -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://images.unsplash.com">
    <link rel="preconnect" href="https://cdn.supabase.co">
    
    <!-- PERF: DNS prefetch for additional domains -->
    <link rel="dns-prefetch" href="https://api.supabase.co">
    
    <!-- PERF: Load fonts with font-display: swap for faster first paint -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Space+Grotesk:wght@300..700&family=League+Spartan:wght@100..900&family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- PERF: Preload critical hero image for LCP improvement -->
    <link rel="preload" href="/Hero/hero-main.jpg" as="image" type="image/jpeg" media="(min-width: 768px)">
    <link rel="preload" href="/Hero/hero-mobile.jpg" as="image" type="image/jpeg" media="(max-width: 767px)">
    
    <!-- PERF: Preload critical fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v18/UcCO3FwrK3iLTeHapMuc5wpYmwdB.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="https://fonts.gstatic.com/s/spacegrotesk/v16/V8mQoQDjQvj0j07OrcS2nVQfZ1JG.woff2" as="font" type="font/woff2" crossorigin>
  </head>
  <body>
    <!-- PERF: Minimal HTML structure for fast initial render -->
    <div id="root"><!--ssr-outlet--></div>
    
    <!-- PERF: Defer non-critical script loading with module type -->
    <script type="module" src="/src/main.tsx" defer></script>
    
    <!-- PERF: Optional: Add resource hints for dynamic imports -->
    <script>
      // PERF: Preload visible content chunks based on viewport
      if ('requestIdleCallback' in window) {
        requestIdleCallback(() => {
          const link = document.createElement('link');
          link.rel = 'prefetch';
          link.href = '/js/vendor-react-*.js';
          document.head.appendChild(link);
        }, { timeout: 2000 });
      }
    </script>
  </body>
</html>
